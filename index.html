<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>品保行事曆＋排程表</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="app-header">
    <h1>🔍 品保行事曆＋排程表</h1>
    <nav class="tab-nav">
      <button class="tab-btn active" data-tab="calendar">📅 行事曆</button>
      <button class="tab-btn" data-tab="schedule">📋 排程表</button>
    </nav>
  </header>

  <!-- ─── Calendar Tab ─── -->
  <section id="tab-calendar" class="tab-panel active">
    <div class="calendar-toolbar">
      <button id="cal-prev">&#8592;</button>
      <span id="cal-title"></span>
      <button id="cal-next">&#8594;</button>
      <button class="btn-primary" id="cal-add-btn">＋ 新增事件</button>
    </div>
    <div class="calendar-weekdays">
      <div>日</div><div>一</div><div>二</div><div>三</div>
      <div>四</div><div>五</div><div>六</div>
    </div>
    <div id="calendar-grid" class="calendar-grid"></div>
  </section>

  <!-- ─── Schedule Tab ─── -->
  <section id="tab-schedule" class="tab-panel">
    <div class="schedule-toolbar">
      <h2>排程任務列表</h2>
      <div class="schedule-filters">
        <label>狀態：
          <select id="filter-status">
            <option value="">全部</option>
            <option value="待處理">待處理</option>
            <option value="進行中">進行中</option>
            <option value="已完成">已完成</option>
            <option value="延遲">延遲</option>
          </select>
        </label>
        <label>優先度：
          <select id="filter-priority">
            <option value="">全部</option>
            <option value="緊急">緊急</option>
            <option value="高">高</option>
            <option value="中">中</option>
            <option value="低">低</option>
          </select>
        </label>
        <button class="btn-primary" id="sched-add-btn">＋ 新增任務</button>
      </div>
    </div>
    <div class="table-wrapper">
      <table id="schedule-table">
        <thead>
          <tr>
            <th>任務名稱</th>
            <th>負責人</th>
            <th>開始日期</th>
            <th>截止日期</th>
            <th>優先度</th>
            <th>狀態</th>
            <th>備註</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="schedule-tbody"></tbody>
      </table>
    </div>
    <div id="schedule-empty" class="empty-msg" style="display:none">尚無任務，請點擊「新增任務」開始建立。</div>
  </section>

  <!-- ─── Modal ─── -->
  <div id="modal-overlay" class="modal-overlay" style="display:none">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="modal-header">
        <h3 id="modal-title">新增事件</h3>
        <button class="modal-close" id="modal-close-btn" aria-label="關閉">&times;</button>
      </div>
      <form id="modal-form" novalidate>
        <!-- Shared fields -->
        <div class="form-group">
          <label for="f-title">標題 <span class="required">*</span></label>
          <input type="text" id="f-title" maxlength="100" required />
        </div>
        <div class="form-group">
          <label for="f-assignee">負責人</label>
          <input type="text" id="f-assignee" maxlength="50" />
        </div>
        <div class="form-group" id="fg-date">
          <label for="f-date">日期 <span class="required">*</span></label>
          <input type="date" id="f-date" required />
        </div>
        <!-- Schedule-only fields -->
        <div id="fg-schedule-extra" style="display:none">
          <div class="form-row">
            <div class="form-group">
              <label for="f-start">開始日期 <span class="required">*</span></label>
              <input type="date" id="f-start" />
            </div>
            <div class="form-group">
              <label for="f-end">截止日期 <span class="required">*</span></label>
              <input type="date" id="f-end" />
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="f-priority">優先度</label>
              <select id="f-priority">
                <option value="低">低</option>
                <option value="中" selected>中</option>
                <option value="高">高</option>
                <option value="緊急">緊急</option>
              </select>
            </div>
            <div class="form-group">
              <label for="f-status">狀態</label>
              <select id="f-status">
                <option value="待處理" selected>待處理</option>
                <option value="進行中">進行中</option>
                <option value="已完成">已完成</option>
                <option value="延遲">延遲</option>
              </select>
            </div>
          </div>
        </div>
        <!-- Calendar-only fields -->
        <div id="fg-cal-extra">
          <div class="form-group">
            <label for="f-category">類別</label>
            <select id="f-category">
              <option value="檢驗">檢驗</option>
              <option value="稽核">稽核</option>
              <option value="教育訓練">教育訓練</option>
              <option value="會議">會議</option>
              <option value="其他">其他</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label for="f-notes">備註</label>
          <textarea id="f-notes" rows="3" maxlength="500"></textarea>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn-primary">儲存</button>
          <button type="button" class="btn-secondary" id="modal-cancel-btn">取消</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ─── Confirm Dialog ─── -->
  <div id="confirm-overlay" class="modal-overlay" style="display:none">
    <div class="modal confirm-modal" role="dialog" aria-modal="true">
      <p id="confirm-msg">確定要刪除嗎？</p>
      <div class="form-actions">
        <button class="btn-danger" id="confirm-ok">確定刪除</button>
        <button class="btn-secondary" id="confirm-cancel">取消</button>
      </div>
    </div>
  </div>

  <script src="js/store.js"></script>
  <script src="js/calendar.js"></script>
  <script src="js/schedule.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
